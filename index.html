<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #121212;
      color: #ffffff;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    #app {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    h1 {
      font-size: 0.75rem;
      font-weight: 700;
      color: #b3b3b3;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #deck-tabs {
      display: flex;
      gap: 0.5rem;
      width: 100%;
    }

    .deck-tab {
      flex: 1;
      background: transparent;
      border: 2px solid #535353;
      color: #b3b3b3;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.45rem 0.75rem;
      border-radius: 500px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s;
      font-family: inherit;
      text-align: center;
    }

    .deck-tab:hover {
      background: #282828;
      border-color: #b3b3b3;
      color: #ffffff;
      transform: scale(1.02);
    }

    .deck-tab.active {
      background: rgba(29, 185, 84, 0.15);
      border-color: #1DB954;
      color: #1DB954;
    }

    #progress-bar-container {
      width: 100%;
      height: 6px;
      background: #333333;
      border-radius: 3px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: #1DB954;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    #card-container {
      width: 100%;
      perspective: 1200px;
      cursor: pointer;
      transition: filter 0.2s ease;
    }

    #card-container:hover {
      filter: brightness(1.05);
    }

    #card {
      position: relative;
      width: 100%;
      min-height: 280px;
      transform-style: preserve-3d;
      transition: transform 0.5s ease;
    }

    #card.flipped {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      min-height: 280px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 12px;
      border: none;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      padding: 2rem 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
    }

    .face.front {
      background: #181818;
    }

    .face.back {
      background: #282828;
      transform: rotateY(180deg);
    }

    .face p {
      font-size: 1.15rem;
      font-weight: 400;
      line-height: 1.6;
      text-align: center;
      color: #ffffff;
    }

    .hint {
      position: absolute;
      bottom: 0.9rem;
      font-size: 0.75rem;
      color: #535353;
      letter-spacing: 0.03em;
      pointer-events: none;
    }

    #card.flipped .hint { opacity: 0; }

    #counter {
      font-size: 0.875rem;
      color: #b3b3b3;
    }

    #nav {
      display: flex;
      gap: 0.75rem;
    }

    #actions {
      display: flex;
      gap: 0.75rem;
    }

    button {
      background: #333333;
      border: none;
      color: #ffffff;
      font-size: 0.875rem;
      font-weight: 700;
      padding: 0.5rem 1.5rem;
      border-radius: 500px;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      font-family: inherit;
      letter-spacing: 0.04em;
    }

    button:hover {
      background: #3e3e3e;
      transform: scale(1.04);
    }

    button:active {
      background: #535353;
      transform: scale(0.98);
    }

    @media (max-width: 480px) {
      .face p { font-size: 1rem; }
      button { padding: 0.5rem 0.9rem; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
<div id="app">
  <h1 id="deck-title">Claude Code Best Practices</h1>
  <div id="deck-tabs">
    <button class="deck-tab active" data-deck="0">Claude Code Best Practices</button>
    <button class="deck-tab" data-deck="1">Prompting Best Practices</button>
    <button class="deck-tab" data-deck="2">How Claude Code Works</button>
    <button class="deck-tab" data-deck="3">Prompt Injection (OWASP)</button>
  </div>
  <div id="progress-bar-container"><div id="progress-bar"></div></div>
  <div id="card-container">
    <div id="card">
      <div class="face front">
        <p id="front-text"></p>
        <span class="hint">Click to reveal answer</span>
      </div>
      <div class="face back">
        <p id="back-text"></p>
      </div>
    </div>
  </div>
  <div id="counter"></div>
  <div id="nav">
    <button id="prev">&#8592; Prev</button>
    <button id="next">Next &#8594;</button>
  </div>
  <div id="actions">
    <button id="shuffle">Shuffle</button>
    <button id="reset">Reset Order</button>
  </div>
</div>

let activeDeckIndex = 0;
let deck = [];
let currentIndex = 0;
let isFlipped = false;

const card = document.getElementById('card');
const frontText = document.getElementById('front-text');
const backText = document.getElementById('back-text');
const counter = document.getElementById('counter');
const progressBar = document.getElementById('progress-bar');
const deckTitle = document.getElementById('deck-title');

function loadDeck(index) {
  activeDeckIndex = index;
  deck = [...Array(DECKS[index].cards.length).keys()];
  currentIndex = 0;
  deckTitle.textContent = DECKS[index].title;
  document.querySelectorAll('.deck-tab').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });
  render();
}

function render() {
  const c = DECKS[activeDeckIndex].cards[deck[currentIndex]];
  frontText.textContent = c.front;
  backText.textContent = c.back;
  counter.textContent = `Card ${currentIndex + 1} of ${deck.length}`;
  progressBar.style.width = `${((currentIndex + 1) / deck.length) * 100}%`;
  card.classList.remove('flipped');
  isFlipped = false;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

document.querySelectorAll('.deck-tab').forEach((btn) => {
  btn.addEventListener('click', () => loadDeck(parseInt(btn.dataset.deck)));
});

card.addEventListener('click', () => {
  isFlipped = !isFlipped;
  card.classList.toggle('flipped', isFlipped);
});

document.getElementById('prev').addEventListener('click', () => {
  if (currentIndex > 0) { currentIndex--; render(); }
});

document.getElementById('next').addEventListener('click', () => {
  if (currentIndex < deck.length - 1) { currentIndex++; render(); }
});

document.getElementById('shuffle').addEventListener('click', () => {
  shuffle(deck);
  currentIndex = 0;
  render();
});

document.getElementById('reset').addEventListener('click', () => {
  deck = [...Array(DECKS[activeDeckIndex].cards.length).keys()];
  currentIndex = 0;
  render();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') {
    if (currentIndex > 0) { currentIndex--; render(); }
  } else if (e.key === 'ArrowRight') {
    if (currentIndex < deck.length - 1) { currentIndex++; render(); }
  } else if (e.key === ' ') {
    e.preventDefault();
    isFlipped = !isFlipped;
    card.classList.toggle('flipped', isFlipped);
  }
});

loadDeck(0);
</script>
